---
- name: Install packages
  ansible.builtin.package:
    name: "vim"
    state: "present"
  become: true

- name: Make VIM the default editor
  community.general.alternatives:
    name: "editor"
    path: "/usr/bin/vim.basic"
  become: true
  register: vim_default_editor
  failed_when:
    - vim_default_editor is failed
    - not ansible_check_mode

- name: Copy global configuration
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/{{ item }}"
    owner: "root"
    group: "root"
    mode: "0644"
  loop:
    - "etc/vim/vimrc.local"
  become: true
